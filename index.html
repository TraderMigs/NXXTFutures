<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA & App Meta -->
    <meta name="application-name" content="NXXT Futures" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NXXT Futures" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="msapplication-TileColor" content="#0A0B0D" />

    <!-- SEO -->
    <meta name="description" content="AI-powered SMC futures trading analysis, live signals, and trading journal." />
    <meta name="keywords" content="futures trading, SMC, smart money concepts, AI trading, ES NQ signals" />

    <!-- Open Graph — E2 FIX: added og:url and og:image (required for link previews on Twitter/Discord/WhatsApp) -->
    <meta property="og:title" content="NXXT Futures — AI-Powered SMC Futures Signals" />
    <meta property="og:description" content="AI-powered SMC futures trading analysis and live signals" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nxxtfutures.com/" />
    <meta property="og:image" content="https://www.nxxtfutures.com/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- E6 FIX: iOS does NOT support SVG for apple-touch-icon — was showing blank home screen icon.
         Now uses icon-192.png which is a standard iOS size. -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>NXXT Futures — AI-Powered SMC Futures Signals</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
